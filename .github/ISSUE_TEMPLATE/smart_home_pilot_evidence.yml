name: Smart-home connector pilot evidence
description: Submit required evidence for the EV4 Responsive Architect smart-home connector pilot.
title: "Pilot Evidence: Smart-home connector"
labels:
  - pilot
  - evidence-intake
body:
  - type: markdown
    attributes:
      value: |
        Use this issue to collect the evidence packet required before the responsive pilot starts.

        Do not claim production readiness from this intake. This intake only determines whether the pilot may start.

        Preferred file naming:
        - `main-ev4-handoff.md`
        - `desktop-baseline-[width].png`
        - `tablet-[width].png`
        - `mobile-[width].png`
        - `breakpoint-inventory.json`

  - type: input
    id: selected_candidate_id
    attributes:
      label: selected_candidate_id
      description: The selected EV4 architecture candidate ID from the main pipeline.
      placeholder: ARCH-FAM-C
    validations:
      required: true

  - type: textarea
    id: evidence_intake_packet_json
    attributes:
      label: Evidence Intake Packet JSON
      description: Paste a machine-readable packet matching ev4-responsive-evidence-intake-packet@1.1.0. Required before the pilot can start.
      placeholder: |
        {
          "schema": "ev4-responsive-evidence-intake-packet@1.1.0",
          "packet_id": "SHP-INTAKE-001",
          "packet_status": "submitted",
          "packet_origin": "real_issue_submission"
        }
    validations:
      required: true

  - type: textarea
    id: evidence_capability_claims
    attributes:
      label: Evidence capability claims
      description: State closed-enum can_support/cannot_support values for every evidence item. Screenshots must not claim CSS cause, DOM order, computed CSS, accessibility pass, or production readiness.
      placeholder: |
        desktop:
          can_support:
            - visible_viewport_state
            - visible_collision
          cannot_support:
            - exact_css_cause
            - dom_reading_order
            - accessibility_pass
            - production_ready_claim
    validations:
      required: true

  - type: textarea
    id: main_ev4_handoff
    attributes:
      label: Main EV4 handoff payloads
      description: Paste or link the Build_Tree_Payload, Implementation_Payload, Final_Audit_Payload, Handoff_Payload, carried unknowns, and audit flags.
      placeholder: |
        Build_Tree_Payload:
        Implementation_Payload:
        Final_Audit_Payload:
        Handoff_Payload:
        carried_unknowns:
        audit_flags:
    validations:
      required: true

  - type: textarea
    id: desktop_baseline
    attributes:
      label: Desktop baseline evidence
      description: Attach or link desktop screenshot and describe source, viewport label/width, root class, must-not-regress items, and known acceptable issues.
      placeholder: |
        file_name: desktop-baseline-1440.png
        source: frontend | editor
        viewport_label_or_width:
        root_class:
        minimum_must_not_regress:
          - meaningful_text_visibility
          - feature_card_group_integrity
          - visual_core_presence
          - connector_layer_containment
          - no_horizontal_overflow
        known_acceptable_desktop_issues:
    validations:
      required: true

  - type: textarea
    id: tablet_evidence
    attributes:
      label: Tablet evidence
      description: Attach or link tablet screenshot and describe source, viewport label/width, visible symptoms, evidence quality, and closed capability claims.
      placeholder: |
        file_name: tablet-768.png
        source: frontend | editor
        viewport_label_or_width:
        quality_level:
        confidence_cap:
        can_support:
        cannot_support:
        visible_symptoms:
    validations:
      required: true

  - type: textarea
    id: mobile_evidence
    attributes:
      label: Mobile evidence
      description: Attach or link mobile screenshot and describe source, viewport label/width, visible symptoms, evidence quality, and closed capability claims.
      placeholder: |
        file_name: mobile-390.png
        source: frontend | editor
        viewport_label_or_width:
        quality_level:
        confidence_cap:
        can_support:
        cannot_support:
        visible_symptoms:
    validations:
      required: true

  - type: dropdown
    id: breakpoint_source
    attributes:
      label: Breakpoint source
      description: Select the strongest breakpoint evidence available.
      options:
        - Elementor project settings or export JSON
        - User declaration
        - Elementor default fallback with unverified label
    validations:
      required: true

  - type: textarea
    id: breakpoint_details
    attributes:
      label: Breakpoint details and claim scope
      description: Provide breakpoint values or explain why fallback is being used. State whether release-ready claims are forbidden.
      placeholder: |
        desktop:
        tablet:
        mobile:
        confidence:
        may_observe:
        may_plan_repair:
        may_handoff_controlled:
        may_claim_release_ready: false
    validations:
      required: true

  - type: textarea
    id: optional_evidence
    attributes:
      label: Optional evidence
      description: Export JSON, resize video, DevTools notes, computed styles, Playwright screenshots, or visual diff.
      placeholder: |
        Elementor export JSON:
        resize sweep video:
        DevTools notes:
        computed style notes:
        Playwright screenshots:
        visual diff:
    validations:
      required: false

  - type: checkboxes
    id: privacy_review
    attributes:
      label: Privacy review
      options:
        - label: I removed credentials, access tokens, private user data, emails, form data, and client-identifying data.
          required: true
        - label: I reviewed screenshots and export-like evidence for private URLs or client identifiers.
          required: true
        - label: I understand that screenshots/export JSON may contain private site data.
          required: true

  - type: checkboxes
    id: boundary_acknowledgement
    attributes:
      label: Boundary acknowledgement
      options:
        - label: I understand this evidence intake does not prove live Elementor rendering validation.
          required: true
        - label: I understand this evidence intake does not prove export JSON validation unless export evidence is supplied.
          required: true
        - label: I understand this evidence intake does not prove accessibility pass or production readiness.
          required: true
