name: Apply PR 179 STATUS guard review fixes

on:
  push:
    branches:
      - automation/wp-resp-005-pr-b-replenish-after-wp015-a

permissions:
  contents: write

jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/wp-resp-005-pr-b-replenish-after-wp015-a
          fetch-depth: 2
      - name: Verify exact preimage and apply bounded fixes
        run: |
          test "$(git rev-parse HEAD^)" = "9d7520e087ebdd4e841701a540359f627f2c718c"
          python - <<'PY'
          from pathlib import Path

          validator = Path('validation/e2e/run_status_merged_foundation_guard_check.py')
          status = Path('STATUS.md')

          validator_text = validator.read_text(encoding='utf-8')
          status_text = status.read_text(encoding='utf-8')

          old_order = '''    C("run_builder_responsive_input_boundary_check.py"),
              C("run_prompt_5_routing_envelope_check.py"),
              C("run_runtime_mismatch_reopen_package_check.py"),
              C("run_responsive_contract_drift_sentinel_check.py"),
              C("run_viewport_inheritance_reset_matrix_check.py"),
              C("run_responsive_handoff_export_boundary_manifest_check.py"),'''.replace('          ', '')
          new_order = '''    C("run_builder_responsive_input_boundary_check.py"),
              C("run_responsive_contract_drift_sentinel_check.py"),
              C("run_viewport_inheritance_reset_matrix_check.py"),
              C("run_responsive_handoff_export_boundary_manifest_check.py"),
              C("run_prompt_5_routing_envelope_check.py"),
              C("run_runtime_mismatch_reopen_package_check.py"),'''.replace('          ', '')
          if validator_text.count(old_order) != 1:
              raise SystemExit('validator order preimage mismatch')
          validator_text = validator_text.replace(old_order, new_order)

          old_extract = '''    match = re.search(r"```json\\s*\\n(?P<payload>.*?)\\n```", section, flags=re.DOTALL)
              if not match:
                  raise AssertionError("STATUS.md catalog status section must contain one JSON snapshot")
              try:
                  payload = json.loads(match.group("payload"))'''.replace('          ', '')
          new_extract = '''    matches = re.findall(r"```json\\s*\\n(?P<payload>.*?)\\n```", section, flags=re.DOTALL)
              if len(matches) != 1:
                  raise AssertionError("STATUS.md catalog status section must contain exactly one JSON snapshot")
              try:
                  payload = json.loads(matches[0])'''.replace('          ', '')
          if validator_text.count(old_extract) != 1:
              raise SystemExit('snapshot extractor preimage mismatch')
          validator_text = validator_text.replace(old_extract, new_extract)

          self_test_anchor = '''    assert_invalid(
                  status_fixture(catalog=catalog, checks=list(reversed(REQUIRED_AUTOMATIC_CHECKS))),
                  catalog,
                  "order differs from Validate workflow",
              )
          '''.replace('          ', '')
          duplicate_test = self_test_anchor + '''
              duplicate_snapshot_section = (
                  status_catalog_section(catalog)
                  + "\\n```json\\n"
                  + json.dumps(expected_catalog_status_snapshot(catalog), indent=2)
                  + "\\n```\\n"
              )
              assert_invalid(
                  status_fixture(catalog=catalog, catalog_section=duplicate_snapshot_section),
                  catalog,
                  "exactly one JSON snapshot",
              )
          '''.replace('          ', '')
          if validator_text.count(self_test_anchor) != 1:
              raise SystemExit('self-test anchor mismatch')
          validator_text = validator_text.replace(self_test_anchor, duplicate_test)

          old_status_order = '''  - python validation/e2e/run_builder_responsive_input_boundary_check.py
              - python validation/e2e/run_prompt_5_routing_envelope_check.py
              - python validation/e2e/run_runtime_mismatch_reopen_package_check.py
              - python validation/e2e/run_responsive_contract_drift_sentinel_check.py
              - python validation/e2e/run_viewport_inheritance_reset_matrix_check.py
              - python validation/e2e/run_responsive_handoff_export_boundary_manifest_check.py'''.replace('          ', '')
          new_status_order = '''  - python validation/e2e/run_builder_responsive_input_boundary_check.py
              - python validation/e2e/run_responsive_contract_drift_sentinel_check.py
              - python validation/e2e/run_viewport_inheritance_reset_matrix_check.py
              - python validation/e2e/run_responsive_handoff_export_boundary_manifest_check.py
              - python validation/e2e/run_prompt_5_routing_envelope_check.py
              - python validation/e2e/run_runtime_mismatch_reopen_package_check.py'''.replace('          ', '')
          if status_text.count(old_status_order) != 1:
              raise SystemExit('STATUS order preimage mismatch')
          status_text = status_text.replace(old_status_order, new_status_order)

          validator.write_text(validator_text, encoding='utf-8')
          status.write_text(status_text, encoding='utf-8')
          PY
          python validation/e2e/run_status_merged_foundation_guard_check.py
          rm .github/workflows/apply-pr179-status-guard-review-fixes.yml
          git diff --check
          changed="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' STATUS.md validation/e2e/run_status_merged_foundation_guard_check.py .github/workflows/apply-pr179-status-guard-review-fixes.yml | sort)"
          test "$changed" = "$expected"
      - name: Commit material review fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add STATUS.md validation/e2e/run_status_merged_foundation_guard_check.py .github/workflows/apply-pr179-status-guard-review-fixes.yml
          git commit -m "fix: align STATUS guard with Validate order"
          git push origin HEAD:automation/wp-resp-005-pr-b-replenish-after-wp015-a
