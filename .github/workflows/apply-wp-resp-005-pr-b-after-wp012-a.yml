name: Apply WP-RESP-005 PR-B after WP-RESP-012 PR-A

on:
  workflow_dispatch:
  push:
    branches:
      - automation/wp-resp-005-pr-b-replenish-after-wp012-a

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/wp-resp-005-pr-b-replenish-after-wp012-a
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: python -m pip install -r requirements.txt
      - name: Materialize catalog reconciliation and replenishment
        run: python scripts/apply_wp_resp_005_pr_b_replenishment_after_wp012_a.py
      - name: Validate material result
        run: |
          python validation/e2e/run_automation_work_package_catalog_check.py
          python validation/e2e/run_automation_work_package_catalog_reassembly_check.py --self-test
          python validation/e2e/run_automation_replenishment_policy_transition_check.py
          python validation/e2e/run_automation_control_state_check.py
          python validation/e2e/run_rolling_queue_check.py
          python validation/e2e/run_run_ledger_check.py
          python validation/e2e/run_task_quality_gate_check.py
      - name: Verify material diff scope
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t changed < <(git status --short | sed -E 's/^.. //' | sort)
          printf '%s\n' "${changed[@]}"
          allowed='^(planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG.json|planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG_INDEX.json|planning/work-packages/WP-RESP-012.json|planning/work-packages/WP-RESP-013.json|planning/work-packages/WP-RESP-015.json|scripts/apply_wp_resp_005_pr_b_replenishment_after_wp012_a.py|.github/workflows/apply-wp-resp-005-pr-b-after-wp012-a.yml)$'
          for path in "${changed[@]}"; do
            [[ "$path" =~ $allowed ]] || { echo "unexpected changed path: $path"; exit 1; }
          done
          test -f planning/work-packages/WP-RESP-015.json
          test ! -e scripts/apply_wp_resp_005_pr_b_replenishment_after_wp012_a.py
          test ! -e .github/workflows/apply-wp-resp-005-pr-b-after-wp012-a.yml
      - name: Commit material result
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "WP-RESP-005/PR-B: reconcile active states and replenish catalog"
          git push origin HEAD:automation/wp-resp-005-pr-b-replenish-after-wp012-a
