name: Apply WP-RESP-005 PR-B after WP-RESP-015 PR-A

on:
  push:
    branches:
      - automation/wp-resp-005-pr-b-replenish-after-wp015-a
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wp-resp-005-pr-b-after-wp015-a
  cancel-in-progress: false

jobs:
  materialize:
    if: github.ref == 'refs/heads/automation/wp-resp-005-pr-b-replenish-after-wp015-a'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: automation/wp-resp-005-pr-b-replenish-after-wp015-a
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Materialize catalog reconciliation and replenishment
        run: python scripts/apply_wp_resp_005_pr_b_replenishment_after_wp015_a.py

      - name: Verify bounded material diff
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t changed < <(git status --short | sed -E 's/^.. //' | sort)
          expected=(
            "planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG.json"
            "planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG_INDEX.json"
            "planning/work-packages/WP-RESP-012.json"
            "planning/work-packages/WP-RESP-015.json"
            "planning/work-packages/WP-RESP-016.json"
          )
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
          if [[ "$(printf '%s\n' "${changed[@]}")" != "$(printf '%s\n' "${expected_sorted[@]}")" ]]; then
            printf 'Unexpected material diff.\nObserved:\n%s\nExpected:\n%s\n' \
              "$(printf '%s\n' "${changed[@]}")" \
              "$(printf '%s\n' "${expected_sorted[@]}")"
            exit 1
          fi

      - name: Run catalog and governance validators
        run: |
          python validation/e2e/run_automation_work_package_catalog_check.py
          python validation/e2e/run_automation_work_package_catalog_reassembly_check.py --self-test
          python validation/e2e/run_automation_replenishment_policy_transition_check.py
          python validation/e2e/run_automation_control_state_check.py
          python validation/e2e/run_rolling_queue_check.py
          python validation/e2e/run_run_ledger_check.py
          python validation/e2e/run_task_quality_gate_check.py

      - name: Replace temporary tooling with material result
        shell: bash
        run: |
          set -euo pipefail
          git rm scripts/apply_wp_resp_005_pr_b_replenishment_after_wp015_a.py
          git rm .github/workflows/apply-wp-resp-005-pr-b-after-wp015-a.yml
          git add \
            planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG.json \
            planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG_INDEX.json \
            planning/work-packages/WP-RESP-012.json \
            planning/work-packages/WP-RESP-015.json \
            planning/work-packages/WP-RESP-016.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "planning(WP-RESP-005): reconcile WP-RESP-015 and replenish ready horizon"
          git push origin HEAD:automation/wp-resp-005-pr-b-replenish-after-wp015-a
