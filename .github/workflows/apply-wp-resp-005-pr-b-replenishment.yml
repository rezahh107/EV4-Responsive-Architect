name: Apply WP-RESP-005 PR-B replenishment

on:
  push:
    branches:
      - automation/wp-resp-005-pr-b-replenish-after-wp009
    paths:
      - scripts/apply_wp_resp_005_pr_b_replenishment.py
      - .github/workflows/apply-wp-resp-005-pr-b-replenishment.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wp-resp-005-pr-b-replenish-after-wp009
  cancel-in-progress: false

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: automation/wp-resp-005-pr-b-replenish-after-wp009
          fetch-depth: 0

      - name: Apply deterministic catalog migration
        run: python scripts/apply_wp_resp_005_pr_b_replenishment.py

      - name: Run affected catalog validators
        run: |
          python validation/e2e/run_automation_work_package_catalog_check.py
          python validation/e2e/run_automation_work_package_catalog_reassembly_check.py --self-test
          python validation/e2e/run_automation_replenishment_policy_transition_check.py
          python validation/e2e/run_automation_control_state_check.py
          python validation/e2e/run_rolling_queue_check.py
          python validation/e2e/run_run_ledger_check.py
          python validation/e2e/run_task_quality_gate_check.py

      - name: Remove one-shot migration tooling
        run: |
          rm scripts/apply_wp_resp_005_pr_b_replenishment.py
          rm .github/workflows/apply-wp-resp-005-pr-b-replenishment.yml

      - name: Commit material result only
        run: |
          if git diff --quiet; then
            echo "Migration produced no material diff" >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG.json
          git add planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG_INDEX.json
          git add planning/work-packages
          git add -u scripts/apply_wp_resp_005_pr_b_replenishment.py
          git add -u .github/workflows/apply-wp-resp-005-pr-b-replenishment.yml
          git diff --cached --name-only
          git commit -m "WP-RESP-005/PR-B reconcile consumed package and replenish catalog"
          git push origin HEAD:automation/wp-resp-005-pr-b-replenish-after-wp009
