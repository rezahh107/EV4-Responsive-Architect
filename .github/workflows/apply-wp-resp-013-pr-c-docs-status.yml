name: Apply WP-RESP-013 PR-C docs and STATUS parity

# Re-trigger bounded materialization after exact-head reconciliation.
on:
  push:
    branches:
      - automation/wp-resp-013-pr-c-routing-docs-status
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wp-resp-013-pr-c-docs-status
  cancel-in-progress: false

jobs:
  materialize:
    if: ${{ !contains(github.event.head_commit.message || '', '[materialized wp-resp-013-pr-c]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/wp-resp-013-pr-c-routing-docs-status
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply bounded documentation migration
        run: python scripts/apply_wp_resp_013_pr_c_docs_status.py

      - name: Run affected validators
        run: |
          python validation/e2e/run_prompt_5_routing_envelope_check.py
          python validation/e2e/run_responsive_contract_drift_sentinel_check.py
          python validation/e2e/run_status_merged_foundation_guard_check.py
          python validation/e2e/run_automation_control_state_check.py
          python validation/e2e/run_automation_work_package_catalog_check.py
          python validation/e2e/run_rolling_queue_check.py
          python validation/e2e/run_run_ledger_check.py
          python validation/e2e/run_task_quality_gate_check.py

      - name: Remove temporary migration tooling
        run: |
          rm scripts/apply_wp_resp_013_pr_c_docs_status.py
          rm .github/workflows/apply-wp-resp-013-pr-c-docs-status.yml

      - name: Verify material diff scope
        run: |
          git diff --exit-code --check
          changed="$(git status --short | awk '{print $2}' | sort)"
          expected="$(printf '%s\n' \
            '.github/workflows/apply-wp-resp-013-pr-c-docs-status.yml' \
            'STATUS.md' \
            'docs/17_VALIDATION_COMMAND_INDEX.md' \
            'docs/20_ACTIVE_CONTRACT_SCHEMA_VALIDATOR_INDEX.md' \
            'docs/48_PROMPT_5_PROJECT_GATE_ROUTING_BOUNDARY.md' \
            'scripts/apply_wp_resp_013_pr_c_docs_status.py' | sort)"
          test "$changed" = "$expected"

      - name: Commit material result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "WP-RESP-013/PR-C: align routing documentation and STATUS [materialized wp-resp-013-pr-c]"
          git push origin HEAD:automation/wp-resp-013-pr-c-routing-docs-status
