name: Apply WP-RESP-013 PR-C docs and STATUS parity

# Re-trigger bounded materialization after exact-head reconciliation.
on:
  push:
    branches:
      - automation/wp-resp-013-pr-c-routing-docs-status
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wp-resp-013-pr-c-docs-status
  cancel-in-progress: false

jobs:
  materialize:
    if: ${{ !contains(github.event.head_commit.message || '', '[materialized wp-resp-013-pr-c]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/wp-resp-013-pr-c-routing-docs-status
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply bounded documentation migration
        run: python scripts/apply_wp_resp_013_pr_c_docs_status.py

      # Commit only the material result first. A GitHub Actions token may be
      # unable to push a commit that deletes the workflow currently executing.
      # Temporary migration tooling is removed in a separate bounded cleanup
      # commit after the materialized exact head is available for review.
      - name: Verify material diff scope
        run: |
          git diff --check
          changed="$(git status --short | awk '{print $2}' | sort)"
          expected="$(printf '%s\n' \
            'STATUS.md' \
            'docs/17_VALIDATION_COMMAND_INDEX.md' \
            'docs/20_ACTIVE_CONTRACT_SCHEMA_VALIDATOR_INDEX.md' \
            'docs/48_PROMPT_5_PROJECT_GATE_ROUTING_BOUNDARY.md' | sort)"
          printf 'Changed paths:\n%s\nExpected paths:\n%s\n' "$changed" "$expected"
          test "$changed" = "$expected"

      - name: Commit material result
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add STATUS.md \
            docs/17_VALIDATION_COMMAND_INDEX.md \
            docs/20_ACTIVE_CONTRACT_SCHEMA_VALIDATOR_INDEX.md \
            docs/48_PROMPT_5_PROJECT_GATE_ROUTING_BOUNDARY.md
          git commit -m "WP-RESP-013/PR-C: align routing documentation and STATUS [materialized wp-resp-013-pr-c]"
          git push origin HEAD:automation/wp-resp-013-pr-c-routing-docs-status
