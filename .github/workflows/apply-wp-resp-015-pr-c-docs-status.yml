name: Apply WP-RESP-015 PR-C docs and STATUS parity

on:
  push:
    branches:
      - automation/wp-resp-015-pr-c-compatibility-docs-status
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: apply-wp-resp-015-pr-c-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: false

jobs:
  materialize:
    if: >-
      (github.event_name == 'push' && github.ref_name == 'automation/wp-resp-015-pr-c-compatibility-docs-status') ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'automation/wp-resp-015-pr-c-compatibility-docs-status')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: automation/wp-resp-015-pr-c-compatibility-docs-status
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Materialize documentation and STATUS parity
        run: python scripts/apply_wp_resp_015_pr_c_docs_status.py
      - name: Verify material diff scope
        shell: bash
        run: |
          git diff --check
          actual="$(git diff --name-only | sort)"
          expected="$(printf '%s\n' \
            STATUS.md \
            docs/17_VALIDATION_COMMAND_INDEX.md \
            docs/20_ACTIVE_CONTRACT_SCHEMA_VALIDATOR_INDEX.md \
            docs/49_RUNTIME_MISMATCH_PROMPT_5_ROUTING_COMPATIBILITY.md | sort)"
          printf 'changed paths:\n%s\n' "$actual"
          printf 'expected paths:\n%s\n' "$expected"
          test "$actual" = "$expected"
      - name: Commit material artifacts and remove temporary tooling
        shell: bash
        run: |
          rm scripts/apply_wp_resp_015_pr_c_docs_status.py
          rm .github/workflows/apply-wp-resp-015-pr-c-docs-status.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add STATUS.md docs/17_VALIDATION_COMMAND_INDEX.md docs/20_ACTIVE_CONTRACT_SCHEMA_VALIDATOR_INDEX.md docs/49_RUNTIME_MISMATCH_PROMPT_5_ROUTING_COMPATIBILITY.md
          git add -u scripts/apply_wp_resp_015_pr_c_docs_status.py .github/workflows/apply-wp-resp-015-pr-c-docs-status.yml
          git commit -m 'docs: align WP-RESP-015 compatibility surfaces'
          git push origin HEAD:automation/wp-resp-015-pr-c-compatibility-docs-status
