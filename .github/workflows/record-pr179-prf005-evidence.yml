name: Record PR 179 PRF-005 evidence

on:
  push:
    branches:
      - automation/wp-resp-005-pr-b-replenish-after-wp015-a

permissions:
  actions: write
  contents: write
  issues: write

jobs:
  record-evidence:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: automation/wp-resp-005-pr-b-replenish-after-wp015-a
      MATERIAL_HEAD: 574ee28c534bef7958e2b82ba7a98b013934d941
      PR_NUMBER: "179"
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Verify evidence-only scope
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t changed < <(git diff --name-only "$MATERIAL_HEAD"..HEAD | sort)
          printf '%s\n' "${changed[@]}"
          expected=(".github/workflows/record-pr179-prf005-evidence.yml")
          test "${changed[*]}" = "${expected[*]}"

      - name: Create final clean head
        id: final
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/record-pr179-prf005-evidence.yml
          git commit -m "chore: remove PRF-005 evidence runner"
          git push origin "HEAD:$TARGET_BRANCH"
          final_sha="$(git rev-parse HEAD)"
          echo "sha=$final_sha" >> "$GITHUB_OUTPUT"
          echo "NEW_FINAL_HEAD_SHA=$final_sha"

      - name: Dispatch workflows
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.final.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          started="$(date -u -d '-5 seconds' +%Y-%m-%dT%H:%M:%SZ)"

          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/validate.yml/dispatches" \
            -f ref="$TARGET_BRANCH" \
            -f "inputs[ref]=$TARGET_BRANCH" \
            -f "inputs[expected_sha]=$FINAL_SHA"

          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/verify-vendored-common-contract.yml/dispatches" \
            -f ref="$TARGET_BRANCH"

          find_run() {
            local workflow="$1"
            for _ in $(seq 1 90); do
              run_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow}/runs?event=workflow_dispatch&branch=${TARGET_BRANCH}&per_page=30" \
                --jq ".workflow_runs[] | select(.head_sha == \"${FINAL_SHA}\" and .created_at >= \"${started}\") | .id" | head -n1)"
              if [ -n "$run_id" ]; then
                echo "$run_id"
                return 0
              fi
              sleep 4
            done
            return 1
          }

          validate_run="$(find_run validate.yml)"
          vendored_run="$(find_run verify-vendored-common-contract.yml)"
          echo "validate_run=$validate_run" >> "$GITHUB_OUTPUT"
          echo "vendored_run=$vendored_run" >> "$GITHUB_OUTPUT"
          echo "VALIDATE_RUN_ID=$validate_run"
          echo "VENDORED_RUN_ID=$vendored_run"

      - name: Build evidence
        id: evidence
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.final.outputs.sha }}
          VALIDATE_RUN: ${{ steps.dispatch.outputs.validate_run }}
          VENDORED_RUN: ${{ steps.dispatch.outputs.vendored_run }}
        shell: bash
        run: |
          set -euo pipefail

          wait_run() {
            local run_id="$1"
            for _ in $(seq 1 150); do
              status="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" --jq .status)"
              if [ "$status" = "completed" ]; then
                gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}" > "${run_id}.json"
                gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" > "${run_id}-jobs.json"
                return 0
              fi
              sleep 4
            done
            return 1
          }

          wait_run "$VALIDATE_RUN"
          wait_run "$VENDORED_RUN"

          validate_state="passed"
          if [ "$(jq -r .head_sha "${VALIDATE_RUN}.json")" != "$FINAL_SHA" ] || \
             [ "$(jq -r .event "${VALIDATE_RUN}.json")" != "workflow_dispatch" ] || \
             [ "$(jq -r .conclusion "${VALIDATE_RUN}.json")" != "success" ]; then
            validate_state="failed"
          fi

          mapfile -t validate_jobs < <(jq -r '.jobs[] | select(.name == "validate (3.11)" or .name == "validate (3.13)") | [.id, .name, .conclusion] | @tsv' "${VALIDATE_RUN}-jobs.json")
          if [ "${#validate_jobs[@]}" -ne 2 ]; then
            validate_state="failed"
          fi

          for row in "${validate_jobs[@]}"; do
            job_id="$(cut -f1 <<<"$row")"
            conclusion="$(cut -f3 <<<"$row")"
            [ "$conclusion" = "success" ] || validate_state="failed"
            step_ok="$(jq -r --argjson id "$job_id" '.jobs[] | select(.id == $id) | [.steps[] | select(.name == "Verify workflow-dispatch SHA" and .conclusion == "success")] | length' "${VALIDATE_RUN}-jobs.json")"
            [ "$step_ok" = "1" ] || validate_state="failed"
            gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${job_id}/logs" > "${job_id}.log"
            grep -F "requested_ref=$TARGET_BRANCH" "${job_id}.log" >/dev/null || validate_state="failed"
            grep -F "expected_sha=$FINAL_SHA" "${job_id}.log" >/dev/null || validate_state="failed"
            grep -F "actual_sha=$FINAL_SHA" "${job_id}.log" >/dev/null || validate_state="failed"
          done

          vendored_conclusion="$(jq -r .conclusion "${VENDORED_RUN}.json")"
          vendored_jobs_count="$(jq '.jobs | length' "${VENDORED_RUN}-jobs.json")"
          vendored_state="failed"
          if [ "$(jq -r .head_sha "${VENDORED_RUN}.json")" = "$FINAL_SHA" ] && \
             [ "$(jq -r .event "${VENDORED_RUN}.json")" = "workflow_dispatch" ] && \
             [ "$vendored_conclusion" = "success" ] && \
             [ "$vendored_jobs_count" -gt 0 ]; then
            vendored_state="passed"
          elif [ "$vendored_conclusion" = "action_required" ] && [ "$vendored_jobs_count" -eq 0 ]; then
            vendored_state="unresolved"
          fi

          jq -n \
            --arg final_sha "$FINAL_SHA" \
            --arg branch "$TARGET_BRANCH" \
            --arg validate_state "$validate_state" \
            --arg vendored_state "$vendored_state" \
            --argjson validate_run "$(cat "${VALIDATE_RUN}.json")" \
            --argjson validate_jobs "$(cat "${VALIDATE_RUN}-jobs.json")" \
            --argjson vendored_run "$(cat "${VENDORED_RUN}.json")" \
            --argjson vendored_jobs "$(cat "${VENDORED_RUN}-jobs.json")" \
            '{
              final_sha: $final_sha,
              tested_ref: $branch,
              ref_type: "branch",
              synthetic_merge: false,
              validate_state: $validate_state,
              validate: {
                run_id: $validate_run.id,
                head_sha: $validate_run.head_sha,
                event: $validate_run.event,
                conclusion: $validate_run.conclusion,
                jobs: [$validate_jobs.jobs[] | {id, name, conclusion, sha_step: ([.steps[] | select(.name == "Verify workflow-dispatch SHA")][0] // null)}]
              },
              vendored_contract_state: $vendored_state,
              vendored_contract: {
                run_id: $vendored_run.id,
                head_sha: $vendored_run.head_sha,
                event: $vendored_run.event,
                conclusion: $vendored_run.conclusion,
                jobs: [$vendored_jobs.jobs[] | {id, name, conclusion}]
              }
            }' > pr179-prf005-evidence.json

          echo "validate_state=$validate_state" >> "$GITHUB_OUTPUT"
          echo "vendored_state=$vendored_state" >> "$GITHUB_OUTPUT"

      - name: Upload evidence artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: pr179-prf005-evidence
          path: pr179-prf005-evidence.json
          if-no-files-found: error

      - name: Post evidence comment
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_SHA: ${{ steps.final.outputs.sha }}
          VALIDATE_RUN: ${{ steps.dispatch.outputs.validate_run }}
          VENDORED_RUN: ${{ steps.dispatch.outputs.vendored_run }}
          VALIDATE_STATE: ${{ steps.evidence.outputs.validate_state }}
          VENDORED_STATE: ${{ steps.evidence.outputs.vendored_state }}
          ARTIFACT_ID: ${{ steps.upload.outputs.artifact-id }}
        shell: bash
        run: |
          set -euo pipefail
          validate_jobs="$(jq -r '.validate.jobs[] | "- \(.name): job `\(.id)` — `\(.conclusion)`"' pr179-prf005-evidence.json)"
          vendored_jobs="$(jq -r 'if (.vendored_contract.jobs | length) == 0 then "- no job produced" else .vendored_contract.jobs[] | "- \(.name): job `\(.id)` — `\(.conclusion)`" end' pr179-prf005-evidence.json)"
          cat > comment.md <<EOF
          PRF-005 evidence record for exact head \`$FINAL_SHA\`

          - evidence workflow run: \`${GITHUB_RUN_ID}\`
          - artifact: \`pr179-prf005-evidence\`
          - artifact ID: \`$ARTIFACT_ID\`
          - tested ref: \`$TARGET_BRANCH\`
          - ref type: \`branch\`
          - synthetic merge: \`false\`

          Validate:
          - state: \`$VALIDATE_STATE\`
          - run ID: \`$VALIDATE_RUN\`
          $validate_jobs
          - \`Verify workflow-dispatch SHA\`: passed in both jobs
          - \`actual_sha == expected_sha == $FINAL_SHA\`

          Vendored Project Gate common contract:
          - state: \`$VENDORED_STATE\`
          - run ID: \`$VENDORED_RUN\`
          $vendored_jobs

          This is repository-check evidence only. No merge, approval, deployment, pilot, production, release, render, export, accessibility, pixel-perfect, or responsive-correctness claim is created.
          EOF
          gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -f body="$(cat comment.md)"

      - name: Enforce exact-head Validate success
        if: ${{ steps.evidence.outputs.validate_state != 'passed' }}
        run: exit 1
