name: Run Ledger

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  run-ledger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Validate run ledger
        run: python validation/e2e/run_run_ledger_check.py
