name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  schema-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate schemas and fixtures
        run: python validation/schema_validator/validate_schemas.py
