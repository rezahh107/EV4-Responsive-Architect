name: Validate

on:
  pull_request:

permissions:
  contents: write

concurrency:
  group: temporary-wp-resp-017-schema-repair-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  repair:
    if: github.head_ref == 'automation/wp-resp-005-pr-b-replenish-after-wp010'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply bounded WP-RESP-017 schema repair
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          catalog_path = Path('planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG.json')
          package_path = Path('planning/work-packages/WP-RESP-017.json')

          catalog = json.loads(catalog_path.read_text(encoding='utf-8'))
          package_file = json.loads(package_path.read_text(encoding='utf-8'))
          package = package_file['work_package']

          boundary = 'Do not introduce an approved standards inventory, external source list, or universal design rule unless its provenance, applicability, exceptions, and conflict handling are explicitly bounded by the Work Package contract.'
          if boundary not in package['forbidden_work']:
              package['forbidden_work'].append(boundary)
          assert len(package['forbidden_work']) >= 5

          catalog['work_packages']['WP-RESP-017'] = package
          catalog_path.write_text(json.dumps(catalog, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

          python validation/e2e/run_automation_work_package_catalog_reassembly_check.py --write

          python - <<'PY'
          import json
          from pathlib import Path

          catalog = json.loads(Path('planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG.json').read_text(encoding='utf-8'))
          package_file = json.loads(Path('planning/work-packages/WP-RESP-017.json').read_text(encoding='utf-8'))
          index = json.loads(Path('planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG_INDEX.json').read_text(encoding='utf-8'))
          package = package_file['work_package']

          assert catalog['work_packages']['WP-RESP-017'] == package
          assert len(package['forbidden_work']) >= 5
          policy = catalog['catalog_replenishment_policy']
          assert (policy['ready_work_package_target'], policy['refresh_when_ready_below'], policy['max_ready_work_packages']) == (4, 4, 5)
          boundaries = catalog['global_boundaries']
          assert boundaries['submitted_evidence_created_by_catalog'] is False
          assert boundaries['issue_8_mutation_allowed_by_catalog'] is False
          assert boundaries['real_pilot_execution_allowed_by_catalog'] is False
          assert boundaries['production_ready'] is False
          assert boundaries['release_ready'] is False
          assert boundaries['live_render_validated'] is False
          assert boundaries['export_json_validated'] is False
          assert boundaries['accessibility_passed'] is False
          assert boundaries['pixel_perfect'] is False
          assert boundaries['responsive_correctness_validated'] is False
          ready = [wp_id for wp_id, wp in catalog['work_packages'].items() if wp.get('selectable') is True and wp.get('ready_state') == 'ready']
          assert ready == ['WP-RESP-011', 'WP-RESP-014', 'WP-RESP-016', 'WP-RESP-017'], ready
          assert any(entry['id'] == 'WP-RESP-017' for entry in index['package_entries'])
          PY

          git show origin/main:.github/workflows/validate.yml > .github/workflows/validate.yml
          rm -f .github/workflows/temporary-wp-resp-017-forbidden-work-repair.yml

      - name: Commit bounded repair and restore workflows
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG.json \
                  planning/EV4_AUTOMATION_WORK_PACKAGE_CATALOG_INDEX.json \
                  planning/work-packages/WP-RESP-017.json \
                  .github/workflows/validate.yml
          if [ -e .github/workflows/temporary-wp-resp-017-forbidden-work-repair.yml ]; then
            git add .github/workflows/temporary-wp-resp-017-forbidden-work-repair.yml
          else
            git add -u .github/workflows/temporary-wp-resp-017-forbidden-work-repair.yml || true
          fi
          git diff --cached --check
          git commit -m 'fix(catalog): complete WP-RESP-017 forbidden-work boundary'
          git push origin HEAD:${{ github.head_ref }}
